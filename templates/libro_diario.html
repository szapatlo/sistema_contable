{% extends "base.html" %}

{% block content %}

<h2>Libro Diario</h2>

<form method="POST">

<div class="mb-3">
<label>Fecha</label>
<input type="date" name="fecha" class="form-control" required>
</div>

<div class="mb-3">
<label>Descripción</label>
<input type="text" name="descripcion" class="form-control" required>
</div>

<table class="table table-bordered">

<thead>
<tr>
<th>Cuenta</th>
<th>Debe</th>
<th>Haber</th>
</tr>
</thead>

<tbody>

{% for i in range(5) %}
<tr>

<td>
<select name="cuenta_id" class="form-control">

{% for c in cuentas %}
<option value="{{c[0]}}">
{{c[1]}} - {{c[2]}}
</option>
{% endfor %}

</select>
</td>

<td>
<input type="number" step="0.01" name="debe" class="form-control">
</td>

<td>
<input type="number" step="0.01" name="haber" class="form-control">
</td>

</tr>
{% endfor %}

</tbody>

</table>

<button type="submit" class="btn btn-primary">
Guardar Asiento
</button>

</form>

<hr>

<h3>Movimientos registrados</h3>

<table class="table table-striped table-bordered">

<thead>
<tr>
<th>Fecha</th>
<th>Descripción</th>
<th>Cuenta</th>
<th>Debe</th>
<th>Haber</th>
</tr>
</thead>

<tbody>

{% for m in movimientos %}

<tr>
<td>{{m[0]}}</td>
<td>{{m[1]}}</td>
<td>{{m[2]}} - {{m[3]}}</td>
<td>{{m[4]}}</td>
<td>{{m[5]}}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
